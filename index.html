<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Задачи">
<meta name="theme-color" content="#f2f2f7">
<title>Задачи</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --ink: #1c1c1e;
    --sub: #8e8e93;
    --line: #e5e5ea;
    --accent: #34c759;
    --blue: #007aff;
    --red: #ff3b30;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
  }
  #app {
    max-width: 500px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 0 calc(110px + env(safe-area-inset-bottom));
    position: relative;
  }
  .header { padding: 16px 20px 12px; }
  .date { font-size: 15px; color: var(--blue); font-weight: 500; }
  .title { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; margin-top: 2px; }
  .count { font-size: 15px; color: var(--sub); margin-top: 2px; }

  .list { padding: 4px 16px; }
  .item {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); padding: 15px 16px;
    border-bottom: 1px solid var(--line);
    animation: slidein .25s ease;
  }
  .item:first-child { border-radius: 14px 14px 0 0; }
  .item:last-child { border-radius: 0 0 14px 14px; border-bottom: none; }
  .item:only-child { border-radius: 14px; }
  @keyframes slidein { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

  .check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--line); flex-shrink: 0; cursor: pointer;
    display: grid; place-items: center; transition: all .2s;
  }
  .check.done { background: var(--accent); border-color: var(--accent); }
  .check svg { width: 14px; height: 14px; opacity: 0; transition: opacity .2s; }
  .check.done svg { opacity: 1; }

  .text { flex: 1; font-size: 17px; line-height: 1.3; transition: all .2s; word-break: break-word; }
  .text.done { color: var(--sub); text-decoration: line-through; }

  .del {
    background: none; border: none; color: var(--red);
    font-size: 24px; cursor: pointer; opacity: 0.55; padding: 0 6px;
    transition: opacity .15s;
  }
  .del:active { opacity: 1; }

  .empty { text-align: center; padding: 70px 30px; color: var(--sub); }
  .empty .em { font-size: 46px; }
  .empty p { margin-top: 12px; font-size: 16px; }

  .composer {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-width: 500px; margin: 0 auto;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: rgba(242,242,247,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
    display: flex; gap: 10px;
  }
  .composer input {
    flex: 1; border: none; background: var(--card);
    border-radius: 20px; padding: 12px 16px; font-size: 17px;
    color: var(--ink); outline: none; font-family: inherit;
  }
  .composer input:focus { box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }
  .add {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: var(--blue); color: #fff; font-size: 26px; cursor: pointer;
    display: grid; place-items: center; flex-shrink: 0; transition: transform .1s;
  }
  .add:active { transform: scale(0.92); }
  .add:disabled { opacity: 0.4; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  const app = document.getElementById("app");
  const KEY = "tasks_v1";
  let tasks = [];

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) tasks = JSON.parse(raw);
    } catch (e) { tasks = []; }
  }
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(tasks)); } catch (e) {}
  }

  function add(text) {
    tasks.unshift({ id: Date.now() + "" + Math.random().toString(36).slice(2, 6), text, done: false });
    save(); render();
  }
  function toggle(id) {
    const t = tasks.find(x => x.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }
  function remove(id) {
    tasks = tasks.filter(x => x.id !== id);
    save(); render();
  }

  const CHECK = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function escapeHTML(s) {
    return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function render() {
    const now = new Date();
    const dstr = now.toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });
    const open = tasks.filter(t => !t.done).length;

    let listHTML;
    if (tasks.length === 0) {
      listHTML = '<div class="empty"><div class="em">📋</div><p>Задач нет. Добавьте первую ниже.</p></div>';
    } else {
      listHTML = '<div class="list">' + tasks.map(t => `
        <div class="item" data-id="${t.id}">
          <div class="check ${t.done ? "done" : ""}" data-act="toggle">${CHECK}</div>
          <div class="text ${t.done ? "done" : ""}">${escapeHTML(t.text)}</div>
          <button class="del" data-act="del">×</button>
        </div>`).join("") + '</div>';
    }

    app.innerHTML = `
      <div class="header">
        <div class="date">${dstr.charAt(0).toUpperCase() + dstr.slice(1)}</div>
        <div class="title">Задачи</div>
        <div class="count">${open === 0 ? (tasks.length ? "Всё выполнено" : "Пусто") : open + " активн" + (open === 1 ? "ая" : "ых")}</div>
      </div>
      ${listHTML}
      <div class="composer">
        <input id="inp" placeholder="Новая задача…" maxlength="200" autocomplete="off" autocorrect="off" />
        <button class="add" id="addbtn" disabled>+</button>
      </div>`;

    const inp = document.getElementById("inp");
    const btn = document.getElementById("addbtn");
    inp.oninput = () => btn.disabled = inp.value.trim() === "";
    const submit = () => { const v = inp.value.trim(); if (v) { add(v); } };
    btn.onclick = submit;
    inp.onkeydown = (e) => { if (e.key === "Enter") submit(); };

    app.querySelectorAll(".item").forEach(el => {
      const id = el.dataset.id;
      el.querySelector('[data-act="toggle"]').onclick = () => toggle(id);
      el.querySelector('[data-act="del"]').onclick = () => remove(id);
    });
  }

  load();
  render();
})();
</script>
</body>
</html>
