<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Задачи">
<meta name="theme-color" content="#f2f2f7">
<title>Задачи</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --ink: #1c1c1e;
    --sub: #8e8e93;
    --line: #e5e5ea;
    --accent: #34c759;
    --blue: #007aff;
    --red: #ff3b30;
    --orange: #ff9500;
    --purple: #af52de;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
  }
  #app {
    max-width: 500px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 0 calc(150px + env(safe-area-inset-bottom));
    position: relative;
  }
  .header { padding: 16px 20px 8px; }
  .date { font-size: 15px; color: var(--blue); font-weight: 500; }
  .title { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; margin-top: 2px; display:flex; align-items:center; justify-content:space-between; }
  .title .menu { background:none; border:none; color:var(--blue); font-size:22px; cursor:pointer; padding:4px 6px; }

  /* date navigator */
  .datenav {
    display:flex; align-items:center; justify-content:space-between;
    margin: 6px 16px 0; background: var(--card); border-radius: 14px; padding: 6px 8px;
  }
  .datenav button {
    background:none; border:none; color:var(--blue); font-size:20px; cursor:pointer;
    padding:6px 14px; border-radius:10px;
  }
  .datenav .label { font-size:15px; font-weight:700; flex:1; text-align:center; }
  .datenav .label small { display:block; font-size:11px; font-weight:500; color:var(--sub); margin-top:1px; }
  .datenav .today-pill {
    font-size:12px; font-weight:600; color:#fff; background:var(--blue);
    padding:5px 10px; border-radius:9px;
  }
  .datenav .today-pill.hidden { visibility:hidden; }

  /* progress dashboard */
  .dash {
    display: flex; gap: 12px; padding: 12px 16px 4px; align-items: stretch;
  }
  .ring-card {
    background: var(--card); border-radius: 16px; padding: 16px;
    display: flex; align-items: center; gap: 14px; flex: 1;
  }
  .ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 15px; font-weight: 700;
  }
  .ring-info .big { font-size: 22px; font-weight: 800; }
  .ring-info .lbl { font-size: 13px; color: var(--sub); margin-top: 2px; }

  .stats { display: flex; flex-direction: column; gap: 12px; }
  .stat-card {
    background: var(--card); border-radius: 16px; padding: 12px 16px;
    min-width: 96px; text-align: center; flex: 1; display: flex;
    flex-direction: column; justify-content: center;
  }
  .stat-card .v { font-size: 22px; font-weight: 800; }
  .stat-card .v .em { font-size: 16px; }
  .stat-card .k { font-size: 12px; color: var(--sub); margin-top: 1px; }

  /* streak bar */
  .streakbar { display:flex; gap:5px; padding: 8px 16px 0; align-items:center; }
  .streakbar .seg { flex:1; height:8px; border-radius:4px; background:var(--line); }
  .streakbar .seg.full { background:var(--accent); }
  .streakbar .seg.part { background:var(--orange); }
  .streakbar .seg.today { outline:2px solid var(--blue); outline-offset:1px; }

  /* section label */
  .seclabel {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 22px 6px; font-size: 13px; font-weight: 600;
    color: var(--sub); text-transform: uppercase; letter-spacing: 0.3px;
  }
  .seclabel button {
    background: none; border: none; color: var(--blue); font-size: 14px;
    font-weight: 500; cursor: pointer; text-transform: none; letter-spacing: 0;
  }

  .list { padding: 0 16px; }
  .item {
    display: flex; align-items: center; gap: 11px;
    background: var(--card); padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    animation: slidein .25s ease;
  }
  .item:first-child { border-radius: 14px 14px 0 0; }
  .item:last-child { border-radius: 0 0 14px 14px; border-bottom: none; }
  .item:only-child { border-radius: 14px; }
  .item.dragging { opacity: 0.45; }
  .item.dragover { box-shadow: inset 0 2.5px 0 var(--blue); }
  @keyframes slidein { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

  .grip {
    color: var(--line); font-size: 17px; cursor: grab; flex-shrink:0;
    touch-action: none; user-select:none; line-height:1; letter-spacing:-2px;
  }
  .grip:active { cursor: grabbing; color: var(--sub); }

  .check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--line); flex-shrink: 0; cursor: pointer;
    display: grid; place-items: center; transition: all .2s;
  }
  .check.done { background: var(--accent); border-color: var(--accent); }
  .check svg { width: 14px; height: 14px; opacity: 0; transition: opacity .2s; }
  .check.done svg { opacity: 1; }

  .tbody { flex: 1; min-width: 0; }
  .text { font-size: 17px; line-height: 1.25; transition: all .2s; word-break: break-word; cursor: text; }
  .text.done { color: var(--sub); text-decoration: line-through; }
  .text-edit {
    font-size:17px; width:100%; border:none; background:transparent; outline:none;
    font-family:inherit; color:var(--ink); border-bottom:1.5px solid var(--blue); padding:0 0 2px;
  }
  .meta { font-size: 12px; color: var(--orange); margin-top: 3px; display: flex; gap: 6px; align-items: center; flex-wrap:wrap; }
  .meta .pill { background: rgba(255,149,0,0.12); padding: 1px 7px; border-radius: 6px; }
  .meta .days { color: var(--sub); }
  .meta .days .pill { background: rgba(142,142,147,0.14); color: var(--sub); }

  .del {
    background: none; border: none; color: var(--red);
    font-size: 24px; cursor: pointer; opacity: 0.5; padding: 0 4px; flex-shrink: 0;
  }
  .del:active { opacity: 1; }

  .empty { text-align: center; padding: 40px 30px; color: var(--sub); }
  .empty .em { font-size: 40px; }
  .empty p { margin-top: 10px; font-size: 15px; }

  /* calendar */
  .cal { background: var(--card); border-radius: 16px; margin: 0 16px; padding: 14px 16px 16px; }
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cal-head .m { font-size: 16px; font-weight: 700; }
  .cal-head button { background: none; border: none; color: var(--blue); font-size: 20px; cursor: pointer; padding: 0 8px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-grid .wd { font-size: 11px; color: var(--sub); text-align: center; padding-bottom: 4px; }
  .cal-cell { aspect-ratio: 1; display: grid; place-items: center; font-size: 13px; border-radius: 9px; position: relative; cursor:pointer; transition: background .15s; }
  .cal-cell.empty2 { visibility: hidden; cursor:default; }
  .cal-cell.today { outline: 2px solid var(--blue); }
  .cal-cell.viewing { background: rgba(0,122,255,0.12); font-weight: 800; }
  .cal-cell.future { color: var(--sub); }
  .cal-dot { position: absolute; bottom: 4px; width: 5px; height: 5px; border-radius: 50%; }

  /* composer */
  .composer {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-width: 500px; margin: 0 auto;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: rgba(242,242,247,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
  }
  .composer .row { display: flex; gap: 10px; }
  .composer input[type=text] {
    flex: 1; border: none; background: var(--card);
    border-radius: 20px; padding: 12px 16px; font-size: 17px;
    color: var(--ink); outline: none; font-family: inherit;
  }
  .composer input:focus { box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }
  .add {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: var(--blue); color: #fff; font-size: 26px; cursor: pointer;
    display: grid; place-items: center; flex-shrink: 0; transition: transform .1s;
  }
  .add:active { transform: scale(0.92); }
  .add:disabled { opacity: 0.4; }

  .opts { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; flex-wrap: wrap; }
  .toggle {
    font-size: 13px; padding: 6px 12px; border-radius: 16px; border: 1px solid var(--line);
    background: var(--card); color: var(--sub); cursor: pointer; font-family: inherit;
  }
  .toggle.on { background: var(--orange); color: #fff; border-color: var(--orange); }
  .wdrow { display: flex; gap: 5px; }
  .wd-btn {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--line);
    background: var(--card); color: var(--sub); font-size: 12px; cursor: pointer;
    display: grid; place-items: center; font-family: inherit;
  }
  .wd-btn.on { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50;
    display: grid; place-items: end center; padding-bottom: 0;
  }
  .modal {
    background: var(--bg); width: 100%; max-width: 500px;
    border-radius: 18px 18px 0 0; padding: 18px 18px calc(24px + env(safe-area-inset-bottom));
    max-height: 80vh; overflow-y: auto; animation: up .25s ease;
  }
  @keyframes up { from { transform: translateY(100%); } to { transform: none; } }
  .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .modal p.hint { font-size: 13px; color: var(--sub); margin-bottom: 14px; }
  .goal-row {
    background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
  }
  .goal-row .gname { flex: 1; font-size: 16px; }
  .goal-row .bar { height: 6px; background: var(--line); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .goal-row .bar > i { display: block; height: 100%; background: var(--purple); border-radius: 3px; }
  .goal-row .gnum { font-size: 13px; color: var(--sub); margin-top: 5px; }
  .modal .close { width: 100%; padding: 14px; border: none; background: var(--card); color: var(--blue); font-size: 17px; font-weight: 600; border-radius: 12px; cursor: pointer; margin-top: 6px; }
  .modal .data-btn {
    width:100%; padding:13px 14px; border:none; background:var(--card); color:var(--blue);
    font-size:16px; font-weight:500; border-radius:12px; cursor:pointer; margin-bottom:8px;
    text-align:left; display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .modal .data-btn span.lead { display:flex; flex-direction:column; }
  .modal .data-btn .sub { font-size:12px; color:var(--sub); font-weight:400; margin-top:2px; }
  .modal .data-btn.danger { color:var(--red); }

  /* cloud sync status chip in header */
  .syncchip {
    font-size:12px; font-weight:600; padding:4px 9px; border-radius:10px;
    background:var(--line); color:var(--sub); display:inline-flex; align-items:center; gap:5px;
    cursor:pointer; border:none; font-family:inherit;
  }
  .syncchip .dot { width:7px; height:7px; border-radius:50%; background:var(--sub); }
  .syncchip.ok { background:rgba(52,199,89,0.14); color:#1e7a36; }
  .syncchip.ok .dot { background:var(--accent); }
  .syncchip.syncing .dot { background:var(--orange); animation:pulse 1s infinite; }
  .syncchip.err { background:rgba(255,59,48,0.12); color:var(--red); }
  .syncchip.err .dot { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* auth form inside data modal */
  .auth-field {
    width:100%; border:none; background:var(--card); border-radius:12px;
    padding:13px 14px; font-size:16px; color:var(--ink); outline:none;
    font-family:inherit; margin-bottom:8px; border:1px solid var(--line);
  }
  .auth-field:focus { box-shadow:0 0 0 3px rgba(0,122,255,0.15); }
  .auth-primary {
    width:100%; padding:13px; border:none; background:var(--blue); color:#fff;
    font-size:16px; font-weight:600; border-radius:12px; cursor:pointer; margin-bottom:8px;
  }
  .auth-primary:disabled { opacity:.5; }
  .auth-link { background:none; border:none; color:var(--blue); font-size:14px; cursor:pointer; padding:6px; }
  .auth-msg { font-size:13px; margin:4px 0 10px; }
  .auth-msg.err { color:var(--red); }
  .auth-msg.ok { color:#1e7a36; }
  .auth-setup {
    background:rgba(255,149,0,0.1); border:1px solid rgba(255,149,0,0.3); color:#8a5a00;
    font-size:13px; padding:10px 12px; border-radius:10px; margin-bottom:12px; line-height:1.4;
  }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept="application/json" style="display:none">

<script>
(function () {
  const app = document.getElementById("app");
  const KEY = "tasks_v2";
  const WD = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
  const WD_ORDER = [1,2,3,4,5,6,0];

  // ============================================================
  //  ОБЛАКО (Supabase). Вставь сюда данные своего проекта:
  //  Supabase → Project Settings → API → Project URL и anon public key
  //  Если оставить пустыми — приложение работает только локально.
  // ============================================================
  const SUPABASE_URL  = "https://hmghkoampfpqpzoermmu.supabase.co";   // напр. "https://abcd1234.supabase.co"
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZ2hrb2FtcGZwcXB6b2VybW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTIyNjYsImV4cCI6MjA5NzU2ODI2Nn0.duh1G3nu8cu5M79Ha3uvLiePkpaP2_v9CHAdUSbWPo8";   // длинный ключ "eyJ..."

  let sb = null;          // клиент Supabase
  let session = null;     // текущая сессия (вход)
  let syncState = "off";  // off | ok | syncing | err
  let syncMsg = "";       // подпись для чипа/ошибок
  let cloudReady = !!(SUPABASE_URL && SUPABASE_ANON);
  let pushTimer = null;   // дебаунс отправки в облако

  // state shape
  // tasks: [{id, text, repeat:null|'daily'|'weekdays', days:[0..6]|null, createdKey, order}]
  // days: { "YYYY-MM-DD": { instances:[{srcId,text,done,order}], oneoffs:[{id,text,done,order}] } }
  let state = { tasks: [], days: {}, calMonth: null };
  let viewKey = null; // currently viewed/edited day

  function todayKey(d) {
    d = d || new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function keyToDate(key) { return new Date(key + "T00:00:00"); }
  function shiftKey(key, delta) { const d = keyToDate(key); d.setDate(d.getDate()+delta); return todayKey(d); }

  function normalize() {
    if (!state.tasks) state.tasks = [];
    if (!state.days) state.days = {};
    state.tasks.forEach((t,i) => { if (t.order == null) t.order = i; });
    Object.values(state.days).forEach(day => {
      if (!day.instances) day.instances = [];
      if (!day.oneoffs) day.oneoffs = [];
      day.instances.forEach((x,i)=>{ if(x.order==null) x.order=i; });
      day.oneoffs.forEach((x,i)=>{ if(x.order==null) x.order=i; });
    });
  }
  function load() {
    try { const raw = localStorage.getItem(KEY); if (raw) state = JSON.parse(raw); } catch(e) {}
    normalize();
  }
  function save() {
    state.updatedAt = Date.now();
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
    schedulePush();
  }

  // ---- cloud: debounced push to Supabase ----
  function schedulePush() {
    if (!sb || !session) return;
    if (pushTimer) clearTimeout(pushTimer);
    pushTimer = setTimeout(pushNow, 800);
  }
  async function pushNow() {
    if (!sb || !session) return;
    syncState = "syncing"; syncMsg = "Сохранение…"; renderSyncChip();
    try {
      const { error } = await sb.from("task_state").upsert({
        user_id: session.user.id,
        data: state,
        updated_at: new Date(state.updatedAt || Date.now()).toISOString()
      }, { onConflict: "user_id" });
      if (error) throw error;
      syncState = "ok"; syncMsg = "Сохранено в облако";
    } catch (e) {
      syncState = "err"; syncMsg = "Ошибка синхронизации";
    }
    renderSyncChip();
  }
  async function pullNow() {
    if (!sb || !session) return;
    syncState = "syncing"; syncMsg = "Загрузка…"; renderSyncChip();
    try {
      const { data, error } = await sb.from("task_state").select("data, updated_at").eq("user_id", session.user.id).maybeSingle();
      if (error) throw error;
      const localTs = state.updatedAt || 0;
      const cloud = data && data.data;
      const cloudTs = cloud && cloud.updatedAt ? cloud.updatedAt : 0;
      if (cloud && cloudTs >= localTs) {
        // cloud is newer (or local empty) — adopt it
        state = cloud; normalize();
        try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
        viewKey = todayKey();
      } else if (localTs > cloudTs) {
        // local is newer — push it up
        await pushNow();
      }
      syncState = "ok"; syncMsg = "Синхронизировано";
    } catch (e) {
      syncState = "err"; syncMsg = "Ошибка загрузки";
    }
    renderSyncChip();
    render();
  }

  async function initCloud() {
    if (!cloudReady || !window.supabase) return;
    try {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
      const { data } = await sb.auth.getSession();
      session = data.session || null;
      sb.auth.onAuthStateChange((_e, s) => {
        const wasIn = !!session;
        session = s;
        if (session && !wasIn) pullNow();
        renderSyncChip(); render();
      });
      if (session) { syncState="ok"; await pullNow(); }
    } catch(e) { cloudReady = false; }
  }

  async function signUp(email, pass) {
    const { error } = await sb.auth.signUp({ email, password: pass });
    return error ? error.message : null;
  }
  async function signIn(email, pass) {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    return error ? error.message : null;
  }
  async function signOut() {
    await sb.auth.signOut();
    session = null; syncState = "off"; syncMsg = "";
    renderSyncChip(); render();
  }

  function renderSyncChip() {
    const chip = document.getElementById("syncchip");
    if (!chip) return;
    chip.className = "syncchip " + (syncState==="ok"?"ok":syncState==="syncing"?"syncing":syncState==="err"?"err":"");
    let label = "Локально";
    if (session) label = syncState==="syncing"?"Синхр…":(syncState==="err"?"Ошибка":"В облаке");
    else if (cloudReady) label = "Войти";
    chip.innerHTML = `<span class="dot"></span>${label}`;
  }

  // materialize recurring templates that apply to a given day
  function ensureDay(key) {
    const dow = keyToDate(key).getDay();
    if (!state.days[key]) state.days[key] = { instances: [], oneoffs: [] };
    const day = state.days[key];
    state.tasks.forEach(t => {
      let applies = false;
      if (t.repeat === "daily") applies = true;
      else if (t.repeat === "weekdays") applies = (t.days || []).includes(dow);
      if (applies && !day.instances.some(i => i.srcId === t.id)) {
        if (key >= (t.createdKey || key)) {
          day.instances.push({ srcId: t.id, text: t.text, done: false, order: (t.order!=null?t.order:day.instances.length) });
        }
      }
    });
    return day;
  }

  function addTask(text, repeat, days) {
    const k = viewKey || todayKey();
    if (repeat) {
      const t = {
        id: Date.now() + "" + Math.random().toString(36).slice(2,5),
        text, repeat, days: days || null, createdKey: k, order: state.tasks.length
      };
      state.tasks.push(t);
      ensureDay(k);
    } else {
      if (!state.days[k]) state.days[k] = { instances: [], oneoffs: [] };
      const ord = state.days[k].oneoffs.length;
      state.days[k].oneoffs.push({ id: Date.now()+""+Math.random().toString(36).slice(2,5), text, done:false, order: ord });
    }
    save(); render();
  }

  function toggleInstance(key, srcId) {
    const i = state.days[key].instances.find(x => x.srcId === srcId);
    if (i) { i.done = !i.done; save(); render(); }
  }
  function toggleOneoff(key, id) {
    const o = state.days[key].oneoffs.find(x => x.id === id);
    if (o) { o.done = !o.done; save(); render(); }
  }
  function removeOneoff(key, id) {
    state.days[key].oneoffs = state.days[key].oneoffs.filter(x => x.id !== id);
    save(); render();
  }
  function removeTemplate(srcId) {
    state.tasks = state.tasks.filter(t => t.id !== srcId);
    const tk = todayKey();
    Object.keys(state.days).forEach(k => {
      if (k >= tk) state.days[k].instances = state.days[k].instances.filter(i => i.srcId !== srcId);
    });
    save(); render();
  }
  function editText(key, kind, id, newText) {
    newText = newText.trim();
    editing = null;
    if (!newText) { render(); return; }
    if (kind === "inst") {
      const i = state.days[key].instances.find(x=>x.srcId===id);
      if (i) i.text = newText;
      const tpl = state.tasks.find(t=>t.id===id);
      if (tpl) tpl.text = newText;
    } else {
      const o = state.days[key].oneoffs.find(x=>x.id===id);
      if (o) o.text = newText;
    }
    save(); render();
  }

  function reorder(key, kind, dragId, targetId) {
    const arr = kind === "inst" ? state.days[key].instances : state.days[key].oneoffs;
    const idOf = x => kind==="inst" ? x.srcId : x.id;
    arr.sort((a,b)=> (a.order??0)-(b.order??0));
    const from = arr.findIndex(x => idOf(x)===dragId);
    const to = arr.findIndex(x => idOf(x)===targetId);
    if (from<0 || to<0 || from===to) return;
    const [moved] = arr.splice(from,1);
    arr.splice(to,0,moved);
    arr.forEach((x,i)=> x.order=i);
    save(); render();
  }

  // ---- progress helpers ----
  function dayItems(key) {
    const day = state.days[key] || { instances: [], oneoffs: [] };
    return [...(day.instances||[]), ...(day.oneoffs||[])];
  }
  function dayPct(key) {
    const items = dayItems(key);
    if (items.length === 0) return null;
    const done = items.filter(i => i.done).length;
    return { done, total: items.length, pct: Math.round(done/items.length*100) };
  }
  function currentStreak() {
    let streak = 0, d = new Date();
    for (let n = 0; n < 400; n++) {
      const key = todayKey(d);
      const p = dayPct(key);
      if (p && p.pct === 100) streak++;
      else if (key === todayKey()) { /* today pending */ }
      else break;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }
  function monthDone() {
    const now = new Date(); let c = 0;
    Object.keys(state.days).forEach(key => {
      const dt = keyToDate(key);
      if (dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear()) {
        const p = dayPct(key); if (p && p.pct === 100) c++;
      }
    });
    return c;
  }
  function templateStats(srcId) {
    let streak = 0, monthC = 0;
    const now = new Date(); let d = new Date(); let counting = true;
    for (let n = 0; n < 400; n++) {
      const key = todayKey(d);
      const day = state.days[key];
      const inst = day && day.instances.find(i => i.srcId === srcId);
      if (counting) {
        if (inst && inst.done) streak++;
        else if (key === todayKey()) {}
        else counting = false;
      }
      if (inst && inst.done) {
        const dt = keyToDate(key);
        if (dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear()) monthC++;
      }
      d.setDate(d.getDate() - 1);
    }
    return { streak, monthC };
  }
  function last7() {
    const out = []; let d = new Date(); d.setDate(d.getDate()-6);
    for (let i=0;i<7;i++){ const k=todayKey(d); out.push({key:k, p:dayPct(k)}); d.setDate(d.getDate()+1); }
    return out;
  }

  const CHECK = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  function esc(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

  let comp = { repeat: false, days: [1,2,3,4,5] };
  let modalOpen = false;
  let dataOpen = false;
  let editing = null; // {kind,id}

  function relDayLabel(key) {
    const tk = todayKey();
    if (key === tk) return "Сегодня";
    if (key === shiftKey(tk,-1)) return "Вчера";
    if (key === shiftKey(tk,1)) return "Завтра";
    return null;
  }

  function render() {
    const tk = todayKey();
    if (!viewKey) viewKey = tk;
    ensureDay(viewKey);

    const vd = keyToDate(viewKey);
    const dstr = vd.toLocaleDateString("ru-RU", { weekday:"long", day:"numeric", month:"long" });
    const rel = relDayLabel(viewKey);

    const p = dayPct(viewKey) || { done:0, total:0, pct:0 };
    const streak = currentStreak();
    const mdone = monthDone();

    const day = state.days[viewKey];
    const recur = [...day.instances].sort((a,b)=>(a.order??0)-(b.order??0));
    const ones  = [...day.oneoffs].sort((a,b)=>(a.order??0)-(b.order??0));

    const R = 28, C = 2*Math.PI*R;
    const off = C * (1 - p.pct/100);
    const ringColor = p.pct === 100 ? "var(--accent)" : "var(--blue)";

    const segs = last7().map(s => {
      let cls = "seg";
      if (s.p) { if (s.p.pct===100) cls+=" full"; else if (s.p.pct>0) cls+=" part"; }
      if (s.key===tk) cls+=" today";
      return `<div class="${cls}"></div>`;
    }).join("");

    function itemRow(i, kind) {
      const id = kind==="inst" ? i.srcId : i.id;
      const isEditing = editing && editing.kind===kind && editing.id===id;
      let meta = "";
      if (kind==="inst") {
        const tpl = state.tasks.find(t=>t.id===i.srcId);
        let metaDays = "";
        if (tpl && tpl.repeat === "weekdays") {
          metaDays = '<span class="days">' + (tpl.days||[]).slice().sort((a,b)=>WD_ORDER.indexOf(a)-WD_ORDER.indexOf(b)).map(d=>'<span class="pill">'+WD[d]+'</span>').join("") + '</span>';
        }
        meta = `<div class="meta"><span class="pill">↻ ${tpl&&tpl.repeat==="weekdays"?"по дням":"каждый день"}</span>${metaDays}</div>`;
      }
      const body = isEditing
        ? `<input class="text-edit" value="${esc(i.text)}" data-kind="${kind}" data-id="${id}">`
        : `<div class="text ${i.done?"done":""}" data-act="editstart" data-kind="${kind}" data-id="${id}">${esc(i.text)}</div>${meta}`;
      const toggleAct = kind==="inst" ? "ti" : "oi";
      const delAct = kind==="inst" ? "rt" : "ro";
      return `<div class="item" draggable="true" data-kind="${kind}" data-rowid="${id}">
        <span class="grip" data-grip="1">⋮⋮</span>
        <div class="check ${i.done?"done":""}" data-act="${toggleAct}" data-id="${id}">${CHECK}</div>
        <div class="tbody">${body}</div>
        <button class="del" data-act="${delAct}" data-id="${id}">×</button>
      </div>`;
    }

    let listHTML = "";
    if (recur.length + ones.length === 0) {
      listHTML = '<div class="empty"><div class="em">📋</div><p>На этот день задач нет. Добавьте задачу или ежедневный шаблон ниже.</p></div>';
    } else {
      if (recur.length) listHTML += '<div class="seclabel">Ежедневные</div><div class="list" data-list="inst">' + recur.map(i=>itemRow(i,"inst")).join("") + '</div>';
      if (ones.length)  listHTML += '<div class="seclabel">Разовые</div><div class="list" data-list="one">' + ones.map(o=>itemRow(o,"one")).join("") + '</div>';
    }

    const wdHTML = WD_ORDER.map(d => `<button class="wd-btn ${comp.days.includes(d)?"on":""}" data-act="wd" data-d="${d}">${WD[d]}</button>`).join("");

    app.innerHTML = `
      <div class="header">
        <div class="date">${rel ? rel : (dstr.charAt(0).toUpperCase()+dstr.slice(1))}</div>
        <div class="title"><span>Задачи</span><span style="display:flex;align-items:center;gap:8px"><button id="syncchip" class="syncchip" data-act="data"><span class="dot"></span>…</button><button class="menu" data-act="data">•••</button></span></div>
      </div>

      <div class="datenav">
        <button data-act="dprev">‹</button>
        <div class="label">${dstr.charAt(0).toUpperCase()+dstr.slice(1)}${rel?`<small>${rel}</small>`:""}</div>
        <button data-act="dtoday" class="today-pill ${viewKey===tk?"hidden":""}">Сегодня</button>
        <button data-act="dnext">›</button>
      </div>

      <div class="dash">
        <div class="ring-card">
          <div class="ring">
            <svg width="64" height="64">
              <circle cx="32" cy="32" r="${R}" fill="none" stroke="var(--line)" stroke-width="7"/>
              <circle cx="32" cy="32" r="${R}" fill="none" stroke="${ringColor}" stroke-width="7"
                stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"
                style="transition:stroke-dashoffset .4s ease"/>
            </svg>
            <div class="pct">${p.pct}%</div>
          </div>
          <div class="ring-info">
            <div class="big">${p.done}/${p.total}</div>
            <div class="lbl">${(rel==="Сегодня"||!rel)?"за день":"за этот день"}</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat-card"><div class="v">${streak}<span class="em"> 🔥</span></div><div class="k">дней подряд</div></div>
          <div class="stat-card"><div class="v">${mdone}</div><div class="k">дней в месяце</div></div>
        </div>
      </div>

      <div class="streakbar">${segs}</div>

      <div class="seclabel"><span></span><button data-act="goals">Цели и серии ›</button></div>

      ${listHTML}

      ${calendarHTML()}

      <div class="composer">
        <div class="opts">
          <button class="toggle ${comp.repeat?"on":""}" data-act="trepeat">↻ Ежедневная</button>
          ${comp.repeat ? '<div class="wdrow">'+wdHTML+'</div>' : ''}
        </div>
        <div class="row">
          <input type="text" id="inp" placeholder="${comp.repeat?'Название ежедневной задачи…':'Задача на '+(rel?rel.toLowerCase():'этот день')+'…'}" maxlength="200" autocomplete="off" autocorrect="off"/>
          <button class="add" id="addbtn" disabled>+</button>
        </div>
      </div>

      ${modalOpen ? goalsModalHTML() : ''}
      ${dataOpen ? dataModalHTML() : ''}
    `;

    if (editing) {
      const ed = app.querySelector(".text-edit");
      if (ed) { ed.focus(); ed.setSelectionRange(ed.value.length, ed.value.length); }
    }

    const inp = document.getElementById("inp");
    const btn = document.getElementById("addbtn");
    inp.oninput = () => btn.disabled = inp.value.trim()==="";
    const submit = () => {
      const v = inp.value.trim(); if (!v) return;
      if (comp.repeat) {
        const allWeek = comp.days.length === 7;
        addTask(v, allWeek ? "daily" : "weekdays", allWeek ? null : comp.days.slice());
      } else addTask(v, null, null);
    };
    btn.onclick = submit;
    inp.onkeydown = e => { if (e.key==="Enter") submit(); };

    app.querySelectorAll(".text-edit").forEach(ed => {
      const finish = () => editText(viewKey, ed.dataset.kind, ed.dataset.id, ed.value);
      ed.onkeydown = e => { if (e.key==="Enter"){ e.preventDefault(); finish(); } if (e.key==="Escape"){ editing=null; render(); } };
      ed.onblur = finish;
    });

    app.querySelectorAll("[data-act]").forEach(el => {
      const act = el.dataset.act;
      el.onclick = () => {
        if (act==="ti") toggleInstance(viewKey, el.dataset.id);
        else if (act==="oi") toggleOneoff(viewKey, el.dataset.id);
        else if (act==="rt") { if (confirm("Удалить эту ежедневную задачу? Она перестанет появляться с сегодняшнего дня (история сохранится).")) removeTemplate(el.dataset.id); }
        else if (act==="ro") removeOneoff(viewKey, el.dataset.id);
        else if (act==="editstart") { editing = {kind:el.dataset.kind, id:el.dataset.id}; render(); }
        else if (act==="trepeat") { comp.repeat = !comp.repeat; render(); }
        else if (act==="wd") {
          const d = +el.dataset.d;
          if (comp.days.includes(d)) comp.days = comp.days.filter(x=>x!==d); else comp.days.push(d);
          if (comp.days.length===0) comp.days=[d];
          render();
        }
        else if (act==="goals") { modalOpen = true; render(); }
        else if (act==="closemodal") { modalOpen = false; render(); }
        else if (act==="data") { dataOpen = true; render(); }
        else if (act==="closedata") { dataOpen = false; render(); }
        else if (act==="export") { doExport(); }
        else if (act==="import") { document.getElementById("importFile").click(); }
        else if (act==="wipe") { if(confirm("Удалить локальные данные? Если вы вошли в облако — копия там сохранится, и при следующей загрузке данные вернутся.")) { state={tasks:[],days:{},calMonth:null}; viewKey=todayKey(); try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} dataOpen=false; render(); } }
        else if (act==="signin" || act==="signup") {
          const em = (document.getElementById("authEmail")||{}).value || "";
          const pw = (document.getElementById("authPass")||{}).value || "";
          const box = document.getElementById("authmsg");
          if (!em || !pw) { if(box) box.innerHTML='<div class="auth-msg err">Введите email и пароль.</div>'; return; }
          if(box) box.innerHTML='<div class="auth-msg">Подождите…</div>';
          (async () => {
            const err = act==="signin" ? await signIn(em,pw) : await signUp(em,pw);
            const box2 = document.getElementById("authmsg");
            if (err) { if(box2) box2.innerHTML='<div class="auth-msg err">'+esc(err)+'</div>'; }
            else if (act==="signup") { if(box2) box2.innerHTML='<div class="auth-msg ok">Аккаунт создан. Если включено подтверждение email — проверьте почту, затем войдите.</div>'; }
            // onAuthStateChange сам подтянет данные и перерисует при успешном входе
          })();
        }
        else if (act==="signout") { signOut(); }
        else if (act==="cloudpull") { pullNow(); }
        else if (act==="calprev") shiftCal(-1);
        else if (act==="calnext") shiftCal(1);
        else if (act==="dprev") { editing=null; viewKey=shiftKey(viewKey,-1); render(); }
        else if (act==="dnext") { editing=null; viewKey=shiftKey(viewKey,1); render(); }
        else if (act==="dtoday") { editing=null; viewKey=todayKey(); render(); }
        else if (act==="calpick") { editing=null; viewKey=el.dataset.key; render(); }
      };
    });

    wireDnD();
    renderSyncChip();
  }

  // ---- drag & drop ----
  function wireDnD() {
    let dragId=null, dragKind=null;
    app.querySelectorAll(".item").forEach(item => {
      item.addEventListener("dragstart", e => {
        dragId = item.dataset.rowid; dragKind = item.dataset.kind;
        item.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
      });
      item.addEventListener("dragend", () => {
        item.classList.remove("dragging");
        app.querySelectorAll(".item").forEach(x=>x.classList.remove("dragover"));
      });
      item.addEventListener("dragover", e => {
        if (item.dataset.kind!==dragKind) return;
        e.preventDefault();
        app.querySelectorAll(".item").forEach(x=>x.classList.remove("dragover"));
        item.classList.add("dragover");
      });
      item.addEventListener("drop", e => {
        e.preventDefault();
        if (item.dataset.kind!==dragKind) return;
        const targetId = item.dataset.rowid;
        if (dragId && targetId && dragId!==targetId) reorder(viewKey, dragKind, dragId, targetId);
      });

      const grip = item.querySelector(".grip");
      if (grip) {
        grip.addEventListener("pointerdown", e => {
          if (e.pointerType === "mouse") return; // mouse uses native DnD
          e.preventDefault();
          dragId = item.dataset.rowid; dragKind = item.dataset.kind;
          item.classList.add("dragging");
          const move = ev => {
            const t = document.elementFromPoint(ev.clientX, ev.clientY);
            const over = t && t.closest(".item");
            app.querySelectorAll(".item").forEach(x=>x.classList.remove("dragover"));
            if (over && over.dataset.kind===dragKind && over.dataset.rowid!==dragId) over.classList.add("dragover");
          };
          const up = ev => {
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerup", up);
            item.classList.remove("dragging");
            const t = document.elementFromPoint(ev.clientX, ev.clientY);
            const over = t && t.closest(".item");
            app.querySelectorAll(".item").forEach(x=>x.classList.remove("dragover"));
            if (over && over.dataset.kind===dragKind) {
              const targetId = over.dataset.rowid;
              if (dragId && targetId && dragId!==targetId) reorder(viewKey, dragKind, dragId, targetId);
            }
          };
          document.addEventListener("pointermove", move);
          document.addEventListener("pointerup", up);
        });
      }
    });
  }

  // ---- export / import ----
  function doExport() {
    const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "tasks-backup-"+todayKey()+".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  document.getElementById("importFile").addEventListener("change", function(e){
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const obj = JSON.parse(r.result);
        if (typeof obj!=="object" || !obj.tasks || !obj.days) throw new Error("bad");
        state = obj;
        normalize();
        save();
        dataOpen=false; viewKey=todayKey(); render();
        alert("Данные восстановлены из резервной копии.");
      } catch(err) { alert("Не удалось прочитать файл резервной копии."); }
      e.target.value="";
    };
    r.readAsText(f);
  });

  // ---- calendar ----
  function shiftCal(delta) {
    let base = state.calMonth ? keyToDate(state.calMonth+"-01") : new Date();
    base.setMonth(base.getMonth()+delta);
    state.calMonth = base.getFullYear()+"-"+String(base.getMonth()+1).padStart(2,"0");
    save(); render();
  }
  function calendarHTML() {
    const base = state.calMonth ? keyToDate(state.calMonth+"-01") : new Date();
    const y = base.getFullYear(), m = base.getMonth();
    const monthName = base.toLocaleDateString("ru-RU",{month:"long",year:"numeric"});
    const first = new Date(y,m,1).getDay();
    const lead = (first+6)%7;
    const daysIn = new Date(y,m+1,0).getDate();
    const tk = todayKey();

    let cells = "";
    for (let i=0;i<lead;i++) cells += '<div class="cal-cell empty2"></div>';
    for (let dnum=1; dnum<=daysIn; dnum++) {
      const key = y+"-"+String(m+1).padStart(2,"0")+"-"+String(dnum).padStart(2,"0");
      const p = dayPct(key);
      let dot = "";
      if (p) {
        let col = p.pct===100 ? "var(--accent)" : (p.pct>0 ? "var(--orange)" : "var(--line)");
        dot = `<span class="cal-dot" style="background:${col}"></span>`;
      }
      const future = key > tk ? "future" : "";
      const viewing = key===viewKey ? "viewing" : "";
      cells += `<div class="cal-cell ${key===tk?"today":""} ${viewing} ${future}" data-act="calpick" data-key="${key}">${dnum}${dot}</div>`;
    }
    const wdh = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"].map(w=>`<div class="wd">${w}</div>`).join("");
    return `
      <div class="seclabel">История · нажмите день, чтобы открыть</div>
      <div class="cal">
        <div class="cal-head">
          <button data-act="calprev">‹</button>
          <div class="m">${monthName.charAt(0).toUpperCase()+monthName.slice(1)}</div>
          <button data-act="calnext">›</button>
        </div>
        <div class="cal-grid">${wdh}${cells}</div>
      </div>`;
  }

  // ---- goals modal ----
  function goalsModalHTML() {
    const recurring = [...state.tasks].sort((a,b)=>(a.order??0)-(b.order??0));
    let rows;
    if (recurring.length === 0) {
      rows = '<p class="hint">Ежедневных задач пока нет. Создайте их через переключатель «↻ Ежедневная» внизу — здесь появятся серии и счётчики по каждой.</p>';
    } else {
      rows = recurring.map(t => {
        const s = templateStats(t.id);
        const goal = 30;
        const pct = Math.min(100, Math.round(s.monthC/goal*100));
        return `<div class="goal-row" style="display:block">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="gname">${esc(t.text)}</div>
            <div style="font-size:15px;font-weight:700">${s.streak} 🔥</div>
          </div>
          <div class="bar"><i style="width:${pct}%"></i></div>
          <div class="gnum">${s.monthC} из ${goal} в этом месяце</div>
        </div>`;
      }).join("");
    }
    return `<div class="modal-bg" data-act="closemodal"><div class="modal" onclick="event.stopPropagation()">
      <h2>Цели и серии</h2>
      <p class="hint">Серия 🔥 — сколько дней подряд задача выполнена. Полоса — прогресс к 30 выполнениям за месяц.</p>
      ${rows}
      <button class="close" data-act="closemodal">Готово</button>
    </div></div>`;
  }

  // ---- data modal ----
  function cloudSectionHTML() {
    if (!cloudReady) {
      return `<div class="auth-setup">☁️ Облако не настроено. Откройте файл <b>index.html</b>, впишите <b>SUPABASE_URL</b> и <b>SUPABASE_ANON</b> вверху скрипта — появится вход и синхронизация между устройствами. Сейчас данные хранятся только в этом браузере.</div>`;
    }
    if (session) {
      return `<div class="goal-row" style="display:block">
        <div style="font-size:15px;font-weight:700">☁️ В облаке</div>
        <div class="sub" style="font-size:13px;color:var(--sub);margin-top:3px">${esc(session.user.email||"")} · ${syncMsg||"синхронизировано"}</div>
      </div>
      <button class="data-btn" data-act="cloudpull"><span class="lead">Загрузить из облака<span class="sub">Подтянуть свежую версию</span></span><span>↺</span></button>
      <button class="data-btn" data-act="signout"><span class="lead">Выйти из аккаунта</span><span>→</span></button>`;
    }
    // not signed in
    return `<div id="authbox">
      <p class="hint" style="margin-bottom:8px">Войдите, чтобы данные синхронизировались и не терялись при смене устройства.</p>
      <div id="authmsg"></div>
      <input class="auth-field" id="authEmail" type="email" placeholder="Email" autocomplete="email">
      <input class="auth-field" id="authPass" type="password" placeholder="Пароль (мин. 6 символов)" autocomplete="current-password">
      <button class="auth-primary" data-act="signin">Войти</button>
      <button class="auth-link" data-act="signup">Нет аккаунта? Зарегистрироваться</button>
    </div>`;
  }

  function dataModalHTML() {
    const dayCount = Object.keys(state.days).length;
    return `<div class="modal-bg" data-act="closedata"><div class="modal" onclick="event.stopPropagation()">
      <h2>Данные и облако</h2>
      ${cloudSectionHTML()}
      <p class="hint" style="margin-top:14px">Локальная копия всегда хранится в этом браузере (работает офлайн). Бэкап-файл — на случай переноса вручную.</p>
      <button class="data-btn" data-act="export"><span class="lead">Экспорт резервной копии<span class="sub">JSON · ${state.tasks.length} шаблонов · ${dayCount} дней истории</span></span><span>⬇︎</span></button>
      <button class="data-btn" data-act="import"><span class="lead">Импорт резервной копии<span class="sub">Заменит текущие данные</span></span><span>⬆︎</span></button>
      <button class="data-btn danger" data-act="wipe"><span class="lead">Очистить локальные данные</span><span>🗑</span></button>
      <button class="close" data-act="closedata">Готово</button>
    </div></div>`;
  }

  load();
  viewKey = todayKey();
  render();
  initCloud();
})();
</script>
</body>
</html>
